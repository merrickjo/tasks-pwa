<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tasks</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1A1A1A">
<link rel="stylesheet" href="styles.css">
<!-- Signature Lock typography: self-hosted only (Phase 0 req 11 forbids
     runtime font requests), so no Google Fonts link tag here on purpose.
     Playfair Display and Roboto Slab woff2 files now live under
     slash fonts slash with font-face rules declared in styles.css,
     nothing to load from the network. -->
</head>
<body>

<div id="setup" class="setup" style="display:none">
  <h1>Connect</h1>
  <p>One-time setup. Paste the Worker URL and app key from your deploy — see README.</p>
  <label for="cfg-url">Worker URL</label>
  <input id="cfg-url" type="text" placeholder="https://tasks-proxy.yourname.workers.dev" autocapitalize="off" autocorrect="off">
  <label for="cfg-key">App key</label>
  <input id="cfg-key" type="text" placeholder="shared secret" autocapitalize="off" autocorrect="off">
  <button id="cfg-save">Connect</button>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="date" id="today-date"></div>
    <h1><span id="view-title">All</span> <span class="count" id="task-count"></span></h1>
    <div class="chips" id="view-chips"></div>
  </div>
  <div class="banner" id="offline-banner">offline — showing last synced view</div>
  <!-- Phase 3: mandate strip. app.js owns all content/visibility here
       (renderConcursusStrip()); hidden until a roll exists for today. -->
  <div id="concursus-strip" class="concursus-strip" role="button" tabindex="0" aria-label="Open CONCURSUS"></div>
  <main id="list"></main>
  <div class="capture">
    <div class="capture-due" id="new-due-chips">
      <button type="button" class="due-chip active" data-due="none">—</button>
      <button type="button" class="due-chip" data-due="today">Today</button>
      <button type="button" class="due-chip" data-due="tomorrow">Tmrw</button>
      <div class="due-date-wrap">
        <input id="new-due-custom" class="due-date-native" type="date" aria-label="Choose custom due date">
        <span class="due-date-placeholder" id="due-date-placeholder" aria-hidden="true">Date</span>
      </div>
    </div>
    <div class="capture-row">
      <input type="text" id="new-title" placeholder="Add a task">
      <select id="new-area">
        <option value="">Area</option>
        <option value="Church">⛪ Church</option>
        <option value="Blibli">🛒 Blibli</option>
        <option value="Fitness">💪 Fitness</option>
        <option value="Family">👨‍👩‍👦 Family</option>
        <option value="Personal">● Personal</option>
      </select>
      <select id="new-priority">
        <option value="P2 - High">P2</option>
        <option value="P3 - Medium" selected>P3</option>
        <option value="P4 - Low">P4</option>
        <option value="P1 - Critical">P1</option>
      </select>
      <button id="new-add">+</button>
    </div>
  </div>

  <div id="edit-backdrop" class="edit-backdrop"></div>
  <div id="edit-sheet" class="edit-sheet" role="dialog" aria-modal="true" aria-label="Edit task" tabindex="-1">
    <div class="edit-sheet-handle" id="edit-sheet-handle"></div>
    <div class="edit-sheet-body">
      <input type="text" id="edit-title" class="edit-title-input" placeholder="Task title">

      <div class="edit-field-label">Due</div>
      <div class="capture-due" id="edit-due-chips">
        <button type="button" class="due-chip" data-due="none">—</button>
        <button type="button" class="due-chip" data-due="today">Today</button>
        <button type="button" class="due-chip" data-due="tomorrow">Tmrw</button>
        <div class="due-date-wrap">
          <input id="edit-due-custom" class="due-date-native" type="date" aria-label="Choose custom due date">
          <span class="due-date-placeholder" id="edit-due-placeholder" aria-hidden="true">Date</span>
        </div>
      </div>

      <div class="edit-field-label">Priority</div>
      <select id="edit-priority" class="edit-select">
        <option value="P1 - Critical">P1</option>
        <option value="P2 - High">P2</option>
        <option value="P3 - Medium">P3</option>
        <option value="P4 - Low">P4</option>
      </select>

      <div class="edit-field-label">Area</div>
      <select id="edit-area" class="edit-select">
        <option value="">No area</option>
        <option value="Church">⛪ Church</option>
        <option value="Blibli">🛒 Blibli</option>
        <option value="Fitness">💪 Fitness</option>
        <option value="Family">👨‍👩‍👦 Family</option>
        <option value="Personal">● Personal</option>
      </select>

      <div class="edit-sheet-msg" id="edit-sheet-msg"></div>
      <div class="edit-sheet-actions">
        <button type="button" id="edit-cancel" class="edit-btn edit-btn-cancel">Cancel</button>
        <button type="button" id="edit-save" class="edit-btn edit-btn-save" disabled>Save</button>
      </div>
    </div>
  </div>
</div>

<!-- CONCURSUS view — charcoal mode surface. Hidden with the same
     display:none/block pairing as #setup/#app; app.js's tab router owns
     showing/hiding this once #app is active. -->
<main id="concursus-view" style="display:none"></main>

<!-- Bottom navigation — Navigation spec: flat floating bar, mode inversion.
     Text-only at 2 tabs per the decided scaling rule. app.js owns all
     routing logic (setActiveTab, click handlers, keyboard-hide behavior);
     this markup is the only thing index.html owns for CONCURSUS. -->
<nav class="tabbar" id="tabbar" style="display:none">
  <button class="tab-btn active" data-tab="tasks" role="tab" aria-selected="true">TASKS</button>
  <button class="tab-btn" data-tab="concursus" role="tab" aria-selected="false">CONCURSUS</button>
</nav>

<script src="app.js"></script>
<script src="concursus.js"></script>
</body>
</html>
